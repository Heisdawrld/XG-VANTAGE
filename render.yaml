services:
  - type: web
    name: xg-vantage
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: chmod +x start.sh && bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: BSD_API_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://xg-vantage.onrender.com
      - key: PORT
        value: "10000"
